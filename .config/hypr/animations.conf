#    ███████║██╔██╗ ██║██║██╔████╔██║███████║   ██║   ██║██║   ██║██╔██╗ ██║███████╗
#    ██╔══██║██║╚██╗██║██║██║╚██╔╝██║██╔══██║   ██║   ██║██║   ██║██║╚██╗██║╚════██║
#    ██║  ██║██║ ╚████║██║██║ ╚═╝ ██║██║  ██║   ██║   ██║╚██████╔╝██║ ╚████║███████║
#    ╚═╝  ╚═╝╚═╝  ╚═══╝╚═╝╚═╝     ╚═╝╚═╝  ╚═╝   ╚═╝   ╚═╝ ╚═════╝ ╚═╝  ╚═══╝╚══════╝


animations {
    enabled = true

    # ── Bezier curves ─────────────────────────────────────────────
    bezier = easeOut,    0.05, 0.9,  0.1,  1.05
    bezier = linear,     0.0,  0.0,  1.0,  1.0
    bezier = overshot,   0.13, 0.99, 0.29, 1.1
    bezier = smoothFade, 0.25, 0.1,  0.25, 1.0
    bezier = snappy,     0.34, 1.56, 0.64, 1.0

    # ── Windows ───────────────────────────────────────────────────
    animation = windows,              1, 3, snappy,     slide
    animation = windowsOut,           1, 3, smoothFade, popin 80%
    animation = windowsMove,          1, 3, smoothFade

    # ── Fade ──────────────────────────────────────────────────────
    animation = fade,                 1, 4, smoothFade
    animation = fadeIn,               1, 3, smoothFade
    animation = fadeOut,              1, 3, smoothFade
    animation = fadeDim,              1, 4, smoothFade

    # ── Workspaces ────────────────────────────────────────────────
    animation = workspaces,           1, 4, overshot,   slide
    animation = workspacesIn,         1, 4, overshot,   slide
    animation = workspacesOut,        1, 3, smoothFade, slide

    # ── Special workspaces ────────────────────────────────────────
    animation = specialWorkspaceIn,   1, 4, smoothFade, fade
    animation = specialWorkspaceOut,  1, 3, smoothFade, fade

    # ── Layers ────────────────────────────────────────────────────
    animation = layers,               1, 3, smoothFade, fade
    animation = layersIn,             1, 3, smoothFade, fade
    animation = layersOut,            1, 2, smoothFade, fade
}
