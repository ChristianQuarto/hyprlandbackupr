# Forza GTK3 a usare i settings.ini
# ── INCLUDES ─────────────────────────────────────────────────────────
source = ~/.config/hypr/keybindings.conf
#source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/colors.conf
# ── MONITOR ──────────────────────────────────────────────────────────
monitor = DP-1,    1920x1080@180, 0x0,    1
#monitor = HDMI-A-1,1920x1080@60,  1920x0, 1
monitor = HDMI-A-1, disable
# ── AUTOSTART ────────────────────────────────────────────────────────
exec-once = ~/.config/hypr/scripts/wallpaper.sh
exec-once = ~/.config/hypr/scripts/apply-theme.sh   # watcher nwg-look
exec-once = hyprctl setcursor pixelfun2-dracula 24
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = swaync
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store
exec-once = xsettingsd 
# ── ENVIRONMENT ──────────────────────────────────────────────────────
# (UN SOLO BLOCCO — rimuovi quello duplicato con Bibata/adw-gtk3-dark)
env = XCURSOR_THEME, pixelfun2-dracula
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_THEME, pixelfun2-dracula
env = HYPRCURSOR_SIZE, 24
env = GTK_THEME, FlatColor
env = QT_QPA_PLATFORM, wayland
env = QT_QPA_PLATFORMTHEME, kvantum    # cambia da qt6ct a kvantum
env = MOZ_ENABLE_WAYLAND, 1
env = ELECTRON_OZONE_PLATFORM_HINT, wayland
# Forza GTK a leggere settings.ini
env = GTK2_RC_FILES, /dev/null
# ── INPUT ─────────────────────────────────────────────────────────────
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = true
    }
}
# ── GENERAL ──────────────────────────────────────────────────────────
general {
    gaps_in = 3
    gaps_out = 6
    border_size = 2
    col.active_border = $active_border
    col.inactive_border = $inactive_border
    layout = dwindle
    resize_on_border = true
}
# ── DECORATION ───────────────────────────────────────────────────────
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.95
    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1a2eff)
    }
    blur {
        enabled = false
        size = 6
        passes = 3
        new_optimizations = true
        xray = false
    }
}
# ── ANIMATIONS ───────────────────────────────────────────────────────
source = ~/.config/hypr/animations.conf
# ── LAYOUT ───────────────────────────────────────────────────────────
dwindle {
 #   pseudotile = true
    preserve_split = true
}
# ── MISC ─────────────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
}
# QuickShell Layer Rules
