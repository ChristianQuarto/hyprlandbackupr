# ██║  ██╗███████╗   ██║   ██████╔╝██║██║ ╚████║██████╔╝██║██║ ╚████║╚██████╔╝███████║
# ╚═╝  ╚═╝╚══════╝   ╚═╝   ╚═════╝ ╚═╝╚═╝  ╚═══╝╚═════╝ ╚═╝╚═╝  ╚═══╝ ╚═════╝ ╚══════╝
# ── KEYBINDINGS ───────────────────────────────────────────────────────
$mod = SUPER
# ── APPLICAZIONI ─────────────────────────────────────────────────────
bind = $mod, Return,    exec, kitty
bind = $mod, B,         exec, firefox
bind = $mod, E,         exec, thunar
bind = $mod, Space,     exec, ~/.config/hypr/scripts/launcher.sh
bind = $mod, P,         exec, ~/.config/hypr/scripts/powermenu.sh
bind = $mod, W,         exec, ~/.config/hypr/scripts/wallpaper_selector.sh
bind = $mod, N,         exec, ~/.config/hypr/scripts/wifi.sh
bind = $mod SHIFT, B,   exec, ~/.config/hypr/scripts/bluetooth.sh
bind = $mod, V,         exec, ~/.config/hypr/scripts/volume.sh
bind = $mod,K,          exec, ~/.config/hypr/scripts/keybindings.sh
bind = $mod,R,          exec, ~/.config/hypr/scripts/rofi/rofi-run.sh
bind = $mod SHIFT,C,     exec, ~/.config/hypr/scripts/rofi/rofi-clipboard.sh
bind = ALT,Tab,         exec, ~/.config/hypr/scripts/rofi/rofi-window.sh
bind = $mod SHIFT, N,   exec, swaync
bind = $mod,L,           exec, ~/.local/share/quickshell-lockscreen/lock.sh

# ── SCREENSHOT ───────────────────────────────────────────────────────
bind = $mod,Print,       exec, ~/.config/hypr/scripts/screenshot.sh
# ── FINESTRE ─────────────────────────────────────────────────────────
bind = $mod,       Q,          killactive
bind = $mod,       F,          fullscreen, 0
bind = $mod SHIFT, F,          togglefloating
#bind = $mod,       J,          togglesplit
bind = $mod,       left,       movefocus, l
bind = $mod,       right,      movefocus, r
bind = $mod,       up,         movefocus, u
bind = $mod,       down,       movefocus, d
bind = $mod SHIFT, left,       movewindow, l
bind = $mod SHIFT, right,      movewindow, r
bind = $mod SHIFT, up,         movewindow, u
bind = $mod SHIFT, down,       movewindow, d
bind = $mod CTRL,  left,       resizeactive, -40 0
bind = $mod CTRL,  right,      resizeactive, 40 0
bind = $mod CTRL,  up,         resizeactive, 0 -40
bind = $mod CTRL,  down,       resizeactive, 0 40
# ── WORKSPACE ────────────────────────────────────────────────────────
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
# ── SPECIALE ─────────────────────────────────────────────────────────
bind = $mod, S, togglespecialworkspace, magic
bind = $mod SHIFT, S, movetoworkspace, special:magic
# ── MOUSE ────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
# ── MEDIA ────────────────────────────────────────────────────────────
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindl  = , XF86AudioPlay,         exec, playerctl play-pause
bindl  = , XF86AudioNext,         exec, playerctl next
bindl  = , XF86AudioPrev,         exec, playerctl previous
# ── LUMINOSITÀ ───────────────────────────────────────────────────────
bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
# ── SHADER ───────────────────────────────────────────────────────────
bind = $mod SHIFT, N, exec, hyprshade toggle blue-light-filter
# ── RELOAD ───────────────────────────────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload
#bind = $mod SHIFT, W, exec, pkill waybar && waybar &
# ──SESSION ───────────────────────────────────────────────────────────
bind = $mod SHIFT, Q, exec, hyprctl dispatch exit
